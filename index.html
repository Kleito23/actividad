<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actividad</title>
    <meta name="description" content="Base mínima de sitio estático con TailwindCSS." />
    <script src="app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 font-sans text-slate-100">
    <main class="flex min-h-screen items-center justify-center px-6 py-16">
      <section class="w-full max-w-3xl rounded-3xl border border-white/10 bg-white/5 p-8 shadow-2xl shadow-black/30 backdrop-blur md:p-10">
        <div class="flex items-center justify-between gap-4 border-b border-white/10 pb-6">
          <div>
            <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Actividad</p>
            <h1 class="mt-2 text-3xl font-semibold text-white md:text-4xl">Base lista para construir</h1>
          </div>
          <span class="rounded-full border border-emerald-400/30 bg-emerald-400/10 px-3 py-1 text-xs font-medium text-emerald-300">TailwindCSS</span>
        </div>

        <div class="grid gap-4 py-8 md:grid-cols-[1.3fr_0.7fr] md:items-end">
          <p class="max-w-xl text-lg leading-8 text-slate-300">
            Dejé el sitio en un punto inicial limpio. Dime qué quieres poner primero y lo vamos armando por partes.
          </p>

          <div class="grid gap-2 text-sm text-slate-400">
            <div class="rounded-2xl border border-white/10 bg-black/20 px-4 py-3">Secciones</div>
            <div class="rounded-2xl border border-white/10 bg-black/20 px-4 py-3">Contenido</div>
            <div class="rounded-2xl border border-white/10 bg-black/20 px-4 py-3">Estilo</div>
          </div>
        </div>

        <div class="rounded-2xl border border-dashed border-white/15 bg-black/10 px-4 py-5 text-sm text-slate-400">
          Espacio reservado para que me indiques el siguiente bloque.
        </div>
      </section>
    </main>
  </body>
</html>
