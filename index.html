<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actividad</title>
    <meta name="description" content="Base mínima de sitio estático con TailwindCSS." />
    <script src="app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/requirements.js"></script>
    <script src="js/index.js"></script>
  </head>
  <body class="min-h-screen bg-slate-950 font-sans text-slate-100">
    <main class="flex min-h-screen items-center justify-center px-6 py-16">
      <section class="w-full max-w-5xl rounded-3xl border border-white/10 bg-white/5 p-8 shadow-2xl shadow-black/30 backdrop-blur md:p-10">
        <div class="flex items-center justify-between gap-4 border-b border-white/10 pb-6">
          <div>
            <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Actividad</p>
          </div>
          <span class="rounded-full border border-emerald-400/30 bg-emerald-400/10 px-3 py-1 text-xs font-medium text-emerald-300">TailwindCSS</span>
        </div>

        <h2 class="mb-4 text-xl font-semibold text-white md:text-2xl">
          202104063 - Kleber Nieto
        </h2>

        <section class="rounded-3xl border border-white/10 bg-slate-900/70 p-4 md:p-6">
          <div class="flex flex-col gap-4 border-b border-white/10 pb-4 md:flex-row md:items-center md:justify-between">
            <div>
              <p class="text-xs uppercase tracking-[0.3em] text-slate-400">Componente</p>
              <h2 class="mt-2 text-2xl font-semibold text-white">Datatable</h2>
            </div>
            <label class="w-full md:max-w-xs">
              <span class="sr-only">Buscar en la tabla</span>
              <input
                id="table-search"
                type="search"
                placeholder="Buscar por nombre o estado..."
                class="w-full rounded-2xl border border-white/10 bg-slate-950 px-4 py-3 text-sm text-slate-100 outline-none transition placeholder:text-slate-500 focus:border-emerald-400/40"
              />
            </label>
          </div>

          <div class="mt-5 overflow-x-auto">
            <table class="min-w-full border-separate border-spacing-0 text-left text-sm">
              <thead>
                <tr class="text-slate-400">
                  <th class="border-b border-white/10 px-4 py-3 font-medium">Fecha</th>
                  <th class="border-b border-white/10 px-4 py-3 font-medium">Hora</th>
                  <th class="border-b border-white/10 px-4 py-3 font-medium">Café</th>
                  <th class="border-b border-white/10 px-4 py-3 font-medium">Tipo de pago</th>
                  <th class="border-b border-white/10 px-4 py-3 font-medium">Monto</th>
                </tr>
              </thead>
              <tbody id="datatable-body" class="text-slate-200">
                <tr>
                  <td colspan="5" class="px-4 py-8 text-center text-slate-400">Cargando datos...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
